services:

  # ── HDFS ──────────────────────────────────────────────────────────────────

  namenode-init:
    image: apache/hadoop:3.5.0
    platform: linux/amd64
    container_name: namenode-init
    user: root
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
      - namenode-data:/tmp/hadoop-root/dfs/name
    networks:
      - etl-net
    command: >
      sh -c "
        if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
          hdfs namenode -format -force -nonInteractive &&
          echo 'Namenode formatted successfully.';
        else
          echo 'Namenode already formatted, skipping.';
        fi
      "

  namenode:
    image: apache/hadoop:3.5.0
    platform: linux/amd64
    hostname: namenode
    container_name: namenode
    user: root
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
      - namenode-data:/tmp/hadoop-root/dfs/name
    ports:
      - "9870:9870"
      - "9000:9000"
    networks:
      - etl-net
    depends_on:
      namenode-init:
        condition: service_completed_successfully
    command: ["hdfs", "namenode"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://namenode:9870/jmx?qry=Hadoop:service=NameNode,name=NameNodeStatus"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 90s

  datanode:
    image: apache/hadoop:3.5.0
    platform: linux/amd64
    hostname: datanode
    container_name: datanode
    user: root
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
      - datanode-data:/tmp/hadoop-datanode/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - etl-net
    command: ["hdfs", "datanode"]

  # ── Spark ─────────────────────────────────────────────────────────────────

  spark-master:
    image: apache/spark:4.1.1
    hostname: spark-master
    container_name: spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./src/modules:/opt/spark/jobs:ro
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - etl-net
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  spark-worker:
    image: apache/spark:4.1.1
    hostname: spark-worker
    container_name: spark-worker
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    networks:
      - etl-net
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  # ── MySQL (Hive metastore backend) ────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: hive_metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hivepass}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - etl-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Apache Hive ───────────────────────────────────────────────────────────

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    hostname: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=com.mysql.cj.jdbc.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:mysql://mysql:3306/hive_metastore?createDatabaseIfNotExist=true
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=${MYSQL_PASSWORD:-hivepass}
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - hive-warehouse:/opt/hive/data/warehouse
    depends_on:
      mysql:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "9083:9083"
    networks:
      - etl-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9083/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  hive-server:
    image: apache/hive:4.0.0
    container_name: hive-server
    hostname: hive-server
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    volumes:
      - ./hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - hive-warehouse:/opt/hive/data/warehouse
    depends_on:
      hive-metastore:
        condition: service_healthy
    ports:
      - "10000:10000"
      - "10002:10002"
    networks:
      - etl-net

  # ── Kafka ─────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - etl-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - etl-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── ETL runner ────────────────────────────────────────────────────────────

  etl-runner:
    build: .
    platform: linux/amd64
    container_name: etl-runner
    command: ["tail", "-f", "/dev/null"]
    environment:
      HDFS_URL: http://namenode:9870
      SPARK_MASTER_URL: spark://spark-master:7077
      HIVE_DB: ${HIVE_DB:-irisdb}
      HIVE_TABLE: ${HIVE_TABLE:-iris_setosa}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iris-setosa}
      AES_KEY: ${AES_KEY}
    volumes:
      - ./src:/app
      - ./src/modules:/opt/spark/jobs:ro
    depends_on:
      namenode:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - etl-net

volumes:
  namenode-data:
  datanode-data:
  mysql-data:
  hive-warehouse:

networks:
  etl-net:
    driver: bridge
