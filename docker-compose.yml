services:

  # Formats the namenode storage directory once, then exits.
  # Skips if already formatted so re-running `docker compose up` is safe.
  namenode-init:
    image: apache/hadoop:3.5.0
    platform: linux/amd64
    container_name: namenode-init
    user: root
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
      - namenode-data:/tmp/hadoop-root/dfs/name
    networks:
      - etl-net
    command: >
      sh -c "
        if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
          hdfs namenode -format -force -nonInteractive &&
          echo 'Namenode formatted successfully.';
        else
          echo 'Namenode already formatted, skipping.';
        fi
      "

  namenode:
    image: apache/hadoop:3.5.0
    platform: linux/amd64
    hostname: namenode
    container_name: namenode
    user: root
    environment:
      HADOOP_NODE: namenode
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
      - namenode-data:/tmp/hadoop-root/dfs/name
    ports:
      - "9870:9870"
      - "9000:9000"
    networks:
      - etl-net
    depends_on:
      namenode-init:
        condition: service_completed_successfully
    command: ["hdfs", "namenode"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/jmx?qry=Hadoop:service=NameNode,name=NameNodeStatus"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 90s

  datanode:
    image: apache/hadoop:3.5.0
    platform: linux/amd64
    hostname: datanode
    container_name: datanode
    user: root
    environment:
      HADOOP_NODE: datanode
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
      - datanode-data:/tmp/hadoop-datanode/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - etl-net
    command: ["hdfs", "datanode"]

  spark-master:
    image: apache/spark:4.1.1
    hostname: spark-master
    container_name: spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./src/modules:/opt/spark/jobs:ro
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - etl-net
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  spark-worker:
    image: apache/spark:4.1.1
    hostname: spark-worker
    container_name: spark-worker
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    networks:
      - etl-net
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  etl-runner:
    build: .
    container_name: etl-runner
    command: ["tail", "-f", "/dev/null"]
    environment:
      HDFS_URL: http://namenode:9870
      OPENAQ_URL: https://api.openaq.org/v2/measurements
      OPENAQ_COUNTRY: DK
      OPENAQ_LIMIT: "1000"
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - ./src:/app
      - ./src/modules:/opt/spark/jobs:ro
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - etl-net

volumes:
  namenode-data:
  datanode-data:

networks:
  etl-net:
    driver: bridge
