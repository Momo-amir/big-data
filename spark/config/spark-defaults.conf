spark.master                        spark://spark-master:7077
# This is what connects Spark to HDFS. Any path your jobs read/write
# (e.g. /data/Input_dir, /data/Output_dir) resolves to hdfs://namenode:9000/<path>.
spark.hadoop.fs.defaultFS           hdfs://namenode:9000
spark.eventLog.enabled              false
spark.sql.shuffle.partitions        4
spark.driver.memory                 1g
spark.executor.memory               1g
spark.driver.extraJavaOptions       -Dhadoop.security.authentication=simple
spark.executor.extraJavaOptions     -Dhadoop.security.authentication=simple

# Hive metastore — Spark bundles Hive 2.3 client but the metastore runs Hive 4.0.
# metastore.client.capability.check=false lets the 2.3 client talk to a 4.x server.
spark.hadoop.hive.metastore.uris                        thrift://hive-metastore:9083
spark.sql.catalogImplementation                         hive
spark.hadoop.metastore.client.capability.check          false
